openapi: 3.0.3
info:
  title: IC Ratings Contractor Search
  version: 1.0.0
  description: Search for independent contractors using natural language.

servers:
  - url: https://ic-ratings-chatgpt-app-production.up.railway.app

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /search:
    post:
      operationId: searchContractors
      summary: Search for contractors
      description: Search for independent contractors using a natural language query with optional filters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Natural language search query
                  example: Find electricians in Missouri under $600/day
                provider:
                  type: string
                  enum:
                    - openai
                    - claude
                  default: openai
                  description: AI provider for ranking
                filters:
                  type: object
                  properties:
                    trade:
                      type: string
                      example: Electrician
                    location_state:
                      type: string
                      example: MO
                    location_city:
                      type: string
                    min_daily_rate:
                      type: number
                    max_daily_rate:
                      type: number
                    available_on:
                      type: string
                      format: date
                    min_rating_overall:
                      type: number
                    active:
                      type: boolean
                    willing_to_travel:
                      type: boolean
                    has_1099:
                      type: boolean
                    skills:
                      type: array
                      items:
                        type: string
                    industries:
                      type: array
                      items:
                        type: string
                    languages:
                      type: array
                      items:
                        type: string
                    certifications:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Missing or invalid token
        '403':
          description: Email not registered
