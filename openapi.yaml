openapi: 3.1.0
info:
  title: IC Ratings Contractor Search
  version: 1.0.0
  description: Search for independent contractors using natural language.

servers:
  - url: https://ic-ratings-chatgpt-app-production.up.railway.app

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SearchResult:
      type: object
      properties:
        summary:
          type: string
        total_in_pool:
          type: integer
        strong_matches:
          type: array
          items:
            type: object
            properties:
              rank:
                type: integer
              confidence:
                type: integer
              reasoning:
                type: string
              name:
                type: string
              trade:
                type: string
              location:
                type: string
              daily_rate:
                type: number
              avg_rating:
                type: number
              review_count:
                type: integer
              willing_to_travel:
                type: boolean
              has_1099:
                type: boolean
              skills:
                type: array
                items:
                  type: string
              certifications:
                type: array
                items:
                  type: string
              relevant_reviews:
                type: array
                items:
                  type: object
                  properties:
                    excerpt:
                      type: string
                    rating_overall:
                      type: number
        partial_matches:
          type: array
          items:
            type: object
        eliminated:
          type: array
          items:
            type: object

security:
  - bearerAuth: []

paths:
  /search:
    post:
      operationId: searchContractors
      summary: Search for contractors
      description: Search for independent contractors using a natural language query with optional filters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Natural language search query
                  example: Find electricians in Missouri under $600/day
                provider:
                  type: string
                  enum:
                    - openai
                    - claude
                  default: openai
                filters:
                  type: object
                  properties:
                    trade:
                      type: string
                    location_state:
                      type: string
                    location_city:
                      type: string
                    min_daily_rate:
                      type: number
                    max_daily_rate:
                      type: number
                    available_on:
                      type: string
                      format: date
                    min_rating_overall:
                      type: number
                    active:
                      type: boolean
                    willing_to_travel:
                      type: boolean
                    has_1099:
                      type: boolean
                    skills:
                      type: array
                      items:
                        type: string
                    industries:
                      type: array
                      items:
                        type: string
                    languages:
                      type: array
                      items:
                        type: string
                    certifications:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '401':
          description: Missing or invalid token
        '403':
          description: Email not registered
